name: Test (reusable)

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - name: Install pip-tools
        run: pip install pip-tools
      - name: Verify compiled files are up to date
        run: |
          pip-compile requirements.in
          pip-compile test-requirements.in
          git diff --exit-code requirements.txt test-requirements.txt || \
            { echo ""; echo "ERROR: Lock files are out of date. Run 'pip-compile requirements.in && pip-compile test-requirements.in' locally and commit the results."; exit 1; }
      - run: pip install -r test-requirements.txt
      - run: ./unittest.sh
