<!DOCTYPE html>
<html>
<head>
    <title>Mesh Watcher | Network Monitor</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/static/favicon.ico">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Leaflet.markercluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    
    <!-- Material Design Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/MaterialDesign-Webfont/7.4.47/css/materialdesignicons.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
    <div x-data="meshApp()" x-init="init()" class="h-screen flex flex-col overflow-hidden">
        
        <!-- Top Menu Bar -->
        <header class="bg-gray-800 text-white px-4 py-2 flex items-center justify-between" style="z-index: var(--z-fixed);">
            <div class="flex items-center space-x-4">
                <button @click="togglePanel('left')" 
                        class="p-2 hover:bg-gray-700 rounded transition-colors"
                        :class="panels.left.visible ? 'bg-gray-700' : ''"
                        :aria-expanded="panels.left.visible"
                        aria-label="Toggle left panel">
                    <i class="mdi mdi-menu text-xl" aria-hidden="true"></i>
                </button>
                
                <h1 class="text-xl font-semibold">Mesh Watcher</h1>
                <span id="commit-sha" class="commit-sha"></span>
            </div>
            
            <div class="flex items-center space-x-2">
                <!-- Right panel toggle removed - sidebar now auto-opens on node selection -->
                <button @click="togglePanel('bottom')" 
                        class="p-2 hover:bg-gray-700 rounded transition-colors"
                        :class="panels.bottom.visible ? 'bg-gray-700' : ''"
                        :aria-expanded="panels.bottom.visible"
                        aria-label="Toggle bottom panel">
                    <i class="mdi mdi-radar text-xl" aria-hidden="true"></i>
                </button>
                
                <!-- Websocket Connection Indicator -->
                <div id="ws-indicator" class="flex items-center space-x-2 px-2 py-1 rounded"
                     :class="socketConnected ? 'bg-green-900 bg-opacity-30' : 'bg-red-900 bg-opacity-30'"
                     :title="socketConnected ? 'Websocket: connected' : 'Websocket: disconnected'">
                    <div id="ws-indicator-dot" class="w-2.5 h-2.5 rounded-full"
                         :class="socketConnected ? 'bg-green-500 shadow-lg shadow-green-500' : 'bg-red-500 shadow-lg shadow-red-500'">
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="flex-1 flex relative overflow-hidden">
            
            <!-- Left Sidebar -->
            <aside x-show="panels.left.visible" 
                   class="fixed left-0 top-16 h-full glass-panel z-40 flex panel"
                   :style="`width: ${panels.left.width}px`">
                
                <!-- Resize Handle -->
                <div class="resize-handle-right absolute right-0 top-0 w-1 h-full bg-gray-300 hover:bg-blue-500 cursor-col-resize z-50"
                     @mousedown="startResize('left', $event)"
                     @touchstart="startResize('left', $event)"></div>
                
                <!-- Panel Content -->
                <div class="flex-1 p-4 overflow-y-auto">
                    <h2 class="text-lg font-semibold mb-4">Map Controls</h2>
                    
                    <!-- Clustering Radius Slider -->
                    <div class="card p-4 mb-6">
                        <label for="clustering-radius" class="block text-sm font-medium text-gray-700 mb-2">
                            Map Clustering Radius
                        </label>
                        <div class="flex items-center space-x-3">
                            <input type="range" 
                                   id="clustering-radius" 
                                   min="0" 
                                   max="50" 
                                   step="1"
                                   x-model="clusteringRadius"
                                   @input="updateClusteringRadius"
                                   class="flex-1 slider">
                            <span class="slider-value" x-text="clusteringRadius + 'px'"></span>
                        </div>
                        <p class="text-xs text-gray-500 mt-1">Adjust the radius for clustering nearby nodes</p>
                    </div>
                    
                    <div class="card p-4">
                        <h3 class="text-sm font-semibold mb-2 text-gray-900">Nodes</h3>

                        <!-- Search input -->
                        <div class="relative mb-2">
                            <input type="text"
                                   x-model="nodeSearchQuery"
                                   placeholder="Search nodes…"
                                    class="w-full pl-3 pr-7 py-1.5 text-sm rounded-lg border border-gray-200 bg-white/60 focus:outline-none focus:ring-1 focus:ring-blue-400">
                            <button x-show="nodeSearchQuery"
                                    @click="nodeSearchQuery = ''"
                                    class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 text-sm leading-none"
                                    style="min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: flex-end; padding-right: 4px;">×</button>
                        </div>

                        <!-- Role filters -->
                        <div class="mb-2">
                            <div class="grid grid-cols-2 gap-x-3 gap-y-1 text-xs text-gray-700">
                                <label class="inline-flex items-center gap-2 select-none">
                                    <input type="checkbox" x-model="nodeRoleFilters.client" class="rounded border-gray-300">
                                    <span>Client</span>
                                </label>
                                <label class="inline-flex items-center gap-2 select-none">
                                    <input type="checkbox" x-model="nodeRoleFilters.router" class="rounded border-gray-300">
                                    <span>Router</span>
                                </label>
                                <label class="inline-flex items-center gap-2 select-none">
                                    <input type="checkbox" x-model="nodeRoleFilters.tracker" class="rounded border-gray-300">
                                    <span>Tracker</span>
                                </label>
                                <label class="inline-flex items-center gap-2 select-none">
                                    <input type="checkbox" x-model="nodeRoleFilters.sensor" class="rounded border-gray-300">
                                    <span>Sensor</span>
                                </label>
                            </div>
                        </div>

                        <!-- Node count -->
                        <p class="text-xs text-gray-500 mb-2"
                           x-text="`${filteredNodes().length} of ${Object.keys(nodes).length} nodes`"></p>

                        <!-- Node list -->
                        <ul class="space-y-0.5 overflow-y-auto max-h-96">
                            <template x-for="node in filteredNodes()" :key="node.id">
                                <li @click="flyToNode(node.id)"
                                    :class="selectedNodeId === node.id ? 'bg-blue-50 border-blue-200' : 'hover:bg-gray-50 border-transparent'"
                                    class="flex items-center gap-2 px-2 py-1.5 rounded-lg cursor-pointer border text-sm transition-colors">
                                    <!-- Status dot -->
                                    <span class="w-2 h-2 rounded-full flex-shrink-0"
                                          :class="{
                                            'bg-green-500': node.info?.status === 'Active',
                                            'bg-yellow-400': node.info?.status === 'Recently Active',
                                            'bg-gray-400': !node.info?.status || node.info.status === 'Inactive'
                                          }"></span>
                                    <!-- Names -->
                                    <span class="flex-1 min-w-0">
                                        <span class="font-medium" x-text="node.short_name || node.id"></span>
                                        <span class="text-gray-500 truncate block text-xs leading-tight" x-text="node.long_name || ''"></span>
                                    </span>
                                    <!-- Position indicator -->
                                    <i x-show="node.position" class="mdi mdi-map-marker text-blue-400 flex-shrink-0 text-xs"></i>
                                </li>
                            </template>
                        </ul>
                    </div>
                </div>
            </aside>

            <!-- Map Container -->
            <div class="flex-1 relative map-container">
                <div id="map" class="w-full h-full"></div>

                <!-- Loading overlay -->
                <div x-show="loading.nodes"
                     x-transition:enter="transition ease-out duration-150"
                     x-transition:enter-start="opacity-0"
                     x-transition:enter-end="opacity-100"
                     x-transition:leave="transition ease-in duration-200"
                     x-transition:leave-start="opacity-100"
                     x-transition:leave-end="opacity-0"
                     class="absolute inset-0 flex items-center justify-center pointer-events-none"
                     style="z-index: 1000;">
                    <div class="flex items-center gap-2 bg-gray-900 bg-opacity-75 text-white text-sm font-medium px-4 py-2 rounded-full shadow-lg">
                        <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" aria-hidden="true">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                        </svg>
                        Loading nodes…
                    </div>
                </div>
            </div>

            <!-- Right Sidebar -->
            <aside x-show="panels.right.visible" 
                   class="fixed right-0 top-16 h-full glass-panel z-40 flex panel"
                   :style="`width: ${panels.right.width}px; --right-sheet-height: ${panels.right.height}px`">
                
                <!-- Panel Content -->
                <div class="flex-1 p-4 overflow-y-auto">
                    <div class="right-sheet-handle"
                         @mousedown="startResize('right', $event)"
                         @touchstart="startResize('right', $event)">
                        <div class="right-sheet-handle-bar"></div>
                    </div>
                    <div x-html="selectedNodeDetailsHtml"></div>
                </div>
            </aside>
        </main>

        <!-- Bottom Panel -->
        <footer x-show="panels.bottom.visible" 
                class="glass-panel z-40 flex fixed bottom-0 left-0 right-0 panel"
                :style="`height: ${panels.bottom.height}px`">
            
            <!-- Resize Handle -->
            <div class="resize-handle-top absolute top-0 left-0 w-full h-1 bg-gray-300 hover:bg-blue-500 cursor-row-resize z-[60]"
                 @mousedown="startResize('bottom', $event)"
                 @touchstart="startResize('bottom', $event)"></div>
            
            <!-- Panel Content -->
            <div class="flex-1 p-2 pt-3 flex flex-col min-h-0">
                <div class="flex items-center justify-between gap-2 mb-2">
                    <div class="flex items-center gap-3 min-w-0">
                        <div class="text-sm font-semibold text-gray-900 truncate">Raw packet log</div>
                        <div class="text-xs text-gray-500" x-text="rawLogStatusText"></div>
                    </div>
                    <div class="flex items-center gap-2">
                        <label class="inline-flex items-center gap-1 text-xs text-gray-700 select-none">
                            <input type="checkbox" x-model="rawLogPauseWhenScrolledUp" class="rounded border-gray-300">
                            <span>Pause on scroll</span>
                        </label>
                        <label class="inline-flex items-center gap-1 text-xs text-gray-700 select-none">
                            <input type="checkbox" x-model="rawLogHideDuplicates" class="rounded border-gray-300" @change="rawLogRerender()">
                            <span>Hide dups</span>
                        </label>
                        <button class="px-2 py-1 text-xs bg-white/70 hover:bg-white rounded border border-gray-200" @click="rawLogClear()">Clear</button>
                    </div>
                </div>

                <div class="flex items-center justify-between gap-2 mb-2" x-show="rawLogPaused">
                    <div class="text-xs text-gray-600">Paused (<span x-text="rawLogBufferedCount"></span> buffered)</div>
                    <button class="px-2 py-1 text-xs bg-blue-600 text-white hover:bg-blue-700 rounded" @click="rawLogResume()">Resume</button>
                </div>

                <div class="raw-log-header">
                    <div class="raw-log-row raw-log-header-row">
                        <div class="raw-log-cell">Received</div>
                        <div class="raw-log-cell">ID</div>
                        <div class="raw-log-cell">From</div>
                        <div class="raw-log-cell">To</div>
                        <div class="raw-log-cell">Channel</div>
                        <div class="raw-log-cell">Port</div>
                        <div class="raw-log-cell">Relay</div>
                        <div class="raw-log-cell">MQTT Uplink</div>
                        <div class="raw-log-cell">Next Hop</div>
                        <div class="raw-log-cell">Data</div>
                        <div class="raw-log-cell"></div>
                    </div>
                </div>
                <div id="raw-log" class="raw-log flex-1 min-h-0 overflow-y-auto rounded border border-gray-200 bg-white/50"></div>
            </div>
        </footer>

        <!-- Packet detail dialog (native, outside Alpine modal system) -->
        <dialog id="packet-detail-dialog" class="packet-detail-dialog">
            <div class="packet-detail-header">
                <span class="packet-detail-title">Packet Details</span>
                <button class="packet-detail-close" aria-label="Close">✕</button>
            </div>
            <pre class="packet-detail-body" id="packet-detail-body"></pre>
        </dialog>

        <!-- Modal Container -->
        <div x-show="modal.visible" 
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"
             x-transition:leave="transition ease-in duration-300"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0"
             @click.self="closeModal()"
             class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center pointer-events-auto"
             style="z-index: var(--z-modal-backdrop);"
             role="dialog"
             aria-modal="true"
             :aria-labelledby="modal.title">
            
            <div x-show="modal.visible"
                 x-transition:enter="transition ease-out duration-300"
                 x-transition:enter-start="opacity-0 transform scale-90"
                 x-transition:enter-end="opacity-100 transform scale-100"
                 x-transition:leave="transition ease-in duration-300"
                 x-transition:leave-start="opacity-100 transform scale-100"
                 x-transition:leave-end="opacity-0 transform scale-90"
                 class="bg-white rounded-lg shadow-xl max-w-md w-full mx-4 pointer-events-auto relative modal-content"
                 style="z-index: var(--z-modal);">
                
                <!-- Modal Header -->
                <div class="flex items-center justify-between p-4 border-b border-gray-200">
                    <h3 class="text-lg font-semibold" 
                        x-text="modal.title" 
                        id="modal-title"></h3>
                    <button @click="closeModal()" 
                            class="p-1 hover:bg-gray-100 rounded"
                            aria-label="Close modal">
                        <i class="mdi mdi-close text-xl" aria-hidden="true"></i>
                    </button>
                </div>
                
                <!-- Modal Body -->
                <div class="p-4">
                    <div x-html="modal.content"></div>
                </div>
                
                <!-- Modal Footer -->
                <div class="flex justify-end space-x-2 p-4 border-t border-gray-200">
                    <button @click="closeModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded">
                        Cancel
                    </button>
                    <button @click="modal.onConfirm()" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">
                        Confirm
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.min.js"></script>
    <script id="app-config" type="application/json">{{ {
        'STATUS_CURRENTLY_ACTIVE_HOURS': settings.status_currently_active_hours,
        'STATUS_RECENTLY_ACTIVE_HOURS': settings.status_recently_active_hours,
        'GIT_COMMIT': settings.git_commit,
        'EVENT_ANIMATIONS_ENABLED': settings.event_animations_enabled,
        'SOCKET_NAMESPACE_EVENTS': settings.namespace_events,
        'SOCKET_NAMESPACE_PACKETS': settings.namespace_packets,
        'EVENT_FLASH_MS': settings.event_flash_ms,
        'CLUSTERING_RADIUS': settings.clustering_radius,
        'HISTORY_MAX_MARKERS': settings.history_max_markers
    } | tojson }}</script>
    <script>
        window.APP_CONFIG = JSON.parse(document.getElementById('app-config').textContent);
    </script>
    <script defer src="/static/js/app-helpers.js"></script>
    <script defer src="/static/js/app-realtime.js"></script>
    <script defer src="/static/js/app-rawlog.js"></script>
    <script defer src="/static/js/app-map.js"></script>
    <script defer src="/static/js/app-nodes.js"></script>
    <script defer src="/static/js/app-node-detail.js"></script>
    <script defer src="/static/js/app.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
