<!DOCTYPE html>
<html>
<head>
    <title>Mesh Packet Log | Hungary</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/static/favicon.ico">
    <script src="//cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        :root {
            --header-height: 56px;
            --spacing-xs: 2px;
            --spacing-sm: 4px;
            --spacing-md: 6px;
            --spacing-lg: 8px;
        }
        body {
            margin: 0;
            font-family: monospace;
            background: #414141;
            color: #eee;
            height: 100vh;
            overflow: hidden;
        }
        #header {
            background: rgba(74, 114, 223, 0.75);
            color: rgb(255, 244, 229);
            text-align: center;
            font-size: 1.1em;
            padding: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .header-title {
            flex: 1;
            text-align: center;
            font-size: clamp(0.9em, 4vw, 1.1em);
        }
        .header-buttons {
            display: flex;
            gap: 4px;
        }
        .header-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            padding: 4px 8px;
            border-radius: 3px;
            font-family: monospace;
            font-size: clamp(0.7em, 3vw, 0.8em);
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .header-btn:hover {
            background: rgba(255,255,255,0.3);
            border-color: rgba(255,255,255,0.5);
        }
        #log {
            height: calc(100vh - var(--header-height));
            padding: 8px;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .log-line {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 4px;
            margin-bottom: var(--spacing-sm);
            cursor: pointer;
        }
        .log-line:hover {
            background: rgba(255,255,255,0.12);
        }
        .log-line.expanded {
            background: rgba(255,255,255,0.14);
            border-color: rgba(255,255,255,0.3);
        }
        .compact-row {
            padding: var(--spacing-md) var(--spacing-lg);
            position: relative;
        }
        /* Color classes */
        .compact-row table.port-nodeinfo { background: rgba(100, 180, 120, 0.3); }
        .compact-row table.port-traceroute { background: rgba(180, 120, 100, 0.3); }
        .compact-row table.port-textmsg { background: rgba(53, 102, 199, 0.3); }
        .compact-row table.port-position { background: rgba(180, 140, 100, 0.3); }
        .compact-row table.port-routing { background: rgba(120, 100, 160, 0.3); }
        
        /* DESKTOP: Fixed layout table */
        @media (min-width: 768px) {
            .compact-row table {
                table-layout: fixed;
                width: 100%;
                border-collapse: collapse;
                font-size: 0.95em;
            }
            .compact-row td {
                padding: 1px 3px;
                border: 1px solid rgba(255,255,255,0.1);
                background: rgba(0,0,0,0.3);
                vertical-align: top;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .col-received { width: 16%; }
            .col-id { width: 8%; }
            .col-from { width: 9%; }
            .col-to { width: 9%; }
            .col-channel { width: 12%; }
            .col-port { width: 8%; }
            .col-uplink { width: 10%; }
            .col-relay { width: 10%; }
            .col-next { width: 10%; }
        }

        /* MOBILE: CSS Grid layout - stacks naturally */
        @media (max-width: 767px) {
            .compact-row {
                padding: 6px;
                display: grid;
                gap: 4px;
                font-size: 0.85em;
            }
            .compact-row::before {
                content: attr(data-summary);
                display: block;
                font-weight: bold;
                color: #fff;
                margin-bottom: 4px;
                padding: 2px 4px;
                background: rgba(0,0,0,0.4);
                border-radius: 2px;
            }
            .compact-row > div {
                display: flex;
                flex-direction: column;
                padding: 2px 4px;
                background: rgba(0,0,0,0.4);
                border: 1px solid rgba(255,255,255,0.1);
                border-radius: 2px;
            }
            .compact-label {
                font-size: 0.65em;
                opacity: 0.9;
                font-weight: bold;
                text-transform: uppercase;
                color: #ccc;
            }
            .compact-value {
                font-family: monospace;
                color: #fff;
                font-size: 0.8em;
                word-break: break-all;
            }
            .expand-indicator {
                display: none;
            }
        }

        .compact-label {
            font-size: 0.75em;
            opacity: 0.8;
            font-weight: bold;
            text-transform: uppercase;
            color: #ccc;
        }
        .compact-value {
            font-family: monospace;
            color: #fff;
            font-size: 0.9em;
        }
        .full-json {
            padding: 8px;
            background: #2b2b2b;
            border-top: 1px solid rgba(255,255,255,0.15);
            margin: 0;
            font-size: 0.9em;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.35;
            max-height: 250px;
            overflow-y: auto;
            border-radius: 0 0 4px 4px;
        }
        .expand-indicator {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.05em;
            opacity: 0.7;
            pointer-events: none;
            font-weight: bold;
        }
        .log-line.expanded .expand-indicator {
            transform: translateY(-50%) rotate(180deg);
        }
    </style>
</head>
<body>
    <!-- HTML structure unchanged -->
    <div id="header">
        <div class="header-title">Mesh packet log via {{ settings.mqtt_server }} | Raw data without deduplication</div>
        <div class="header-buttons">
            <button class="header-btn" id="collapse-all">Collapse All</button>
            <button class="header-btn" id="clear-all">Clear</button>
        </div>
    </div>
    <div id="log"></div>

    <script type="application/javascript">
        const socket = io('{{ settings.namespace_rawdata }}');
        const logDiv = document.getElementById('log');
        const collapseAllBtn = document.getElementById('collapse-all');
        const clearAllBtn = document.getElementById('clear-all');

        const portColors = {
            'NODEINFO_APP': 'port-nodeinfo',
            'TRACEROUTE_APP': 'port-traceroute', 
            'TEXT_MESSAGE_APP': 'port-textmsg',
            'POSITION_APP': 'port-position',
            'ROUTING_APP': 'port-routing'
        };

        function safeParse(rawData) {
            if (typeof rawData !== 'string') return rawData;
            try {
                return JSON.parse(rawData);
            } catch (e) {
                console.warn('Invalid JSON received:', rawData?.substring(0, 100));
                return null;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTimestamp(unixTime) {
            if (!unixTime || unixTime === null || unixTime === undefined) return 'N/A';
            try {
                const date = new Date(unixTime * 1000);
                return date.toLocaleString();
            } catch (e) {
                return 'Invalid';
            }
        }

        function toHex (n, digits = 8) {
  const num = +n;
  if (!num) return '0'.repeat(digits);
  return (BigInt(num)).toString(16).padStart(digits, '0');
        };

        function renderCompact(lineData) {
            const id_ = lineData.id_ !== undefined ? String(lineData.id_) : 'N/A';
            const from_ = lineData.from_ !== undefined ? '!'+toHex(lineData.from_) : 'N/A';
            const to = lineData.to !== undefined ? (lineData.to === 4294967295 ? 'BROADCAST' : '!'+toHex(lineData.to)) : 'N/A';
            const channel_name = lineData.channel_name || 'N/A';
            const portnum = lineData.decoded?.portnum || 'N/A';
            const uplink = lineData.uplink || 'N/A';
            const relay_node = lineData.relay_node !== null ? toHex(lineData.relay_node, 2) : 'N/A';
            const next_hop = lineData.next_hop !== null ? toHex(lineData.next_hop, 2) : 'N/A';
            const received = formatTimestamp(lineData.rx_time);

            const logLine = document.createElement('div');
            logLine.className = 'log-line';
            logLine.dataset.rawData = JSON.stringify(lineData);
            logLine.dataset.isExpanded = 'false';

            const compactRow = document.createElement('div');
            compactRow.className = 'compact-row';

            // MOBILE SUMMARY (shows port + from/to)
            const mobileSummary = `Port: ${portnum} | ${from_} → ${to}`;
            compactRow.dataset.summary = mobileSummary;

            const table = document.createElement('table');
            const portColorClass = portColors[portnum] || '';
            if (portColorClass) {
                table.classList.add(portColorClass);
            }

            const row = table.insertRow();
            
            const fields = [
                {label: 'Received', value: received, colClass: 'col-received received-col'},
                {label: 'Message ID', value: id_, colClass: 'col-id other-col'},
                {label: 'From', value: from_, colClass: 'col-from other-col'},
                {label: 'To', value: to, colClass: 'col-to other-col'},
                {label: 'Channel', value: channel_name, colClass: 'col-channel other-col'},
                {label: 'Port', value: portnum, colClass: 'col-port other-col'},
                {label: 'MQTT Uplink', value: uplink, colClass: 'col-uplink other-col'},
                {label: 'Relay (Received Via)', value: relay_node, colClass: 'col-relay other-col'},
                {label: 'Next Hop', value: next_hop, colClass: 'col-next other-col'}
            ];

            fields.forEach(field => {
                const cell = row.insertCell();
                cell.className = field.colClass;
                cell.innerHTML = `
                    <div class="compact-label">${escapeHtml(field.label)}</div>
                    <div class="compact-value">${escapeHtml(field.value)}</div>
                `;
            });

            const indicator = document.createElement('div');
            indicator.className = 'expand-indicator';
            indicator.textContent = '▼';
            compactRow.appendChild(indicator);
            compactRow.appendChild(table);
            logLine.appendChild(compactRow);

            logLine.addEventListener('click', (e) => {
                if (e.target.closest('.expand-indicator')) return;
                toggleExpand(logLine);
            });

            return logLine;
        }

        // Rest of functions unchanged (toggleExpand, collapseAll, etc.)
        function toggleExpand(logLine) {
            const isExpanded = logLine.dataset.isExpanded === 'true';
            if (isExpanded) {
                const jsonBlock = logLine.querySelector('.full-json');
                if (jsonBlock) jsonBlock.remove();
                logLine.classList.remove('expanded');
                logLine.dataset.isExpanded = 'false';
            } else {
                const rawData = JSON.parse(logLine.dataset.rawData);
                const jsonDiv = document.createElement('div');
                jsonDiv.className = 'full-json';
                jsonDiv.textContent = JSON.stringify(rawData, null, 2);
                logLine.appendChild(jsonDiv);
                logLine.classList.add('expanded');
                logLine.dataset.isExpanded = 'true';
            }
        }

        function collapseAll() {
            const expandedLines = logDiv.querySelectorAll('.log-line.expanded');
            expandedLines.forEach(logLine => {
                const jsonBlock = logLine.querySelector('.full-json');
                if (jsonBlock) jsonBlock.remove();
                logLine.classList.remove('expanded');
                logLine.dataset.isExpanded = 'false';
            });
        }

        function clearAll() {
            logDiv.innerHTML = '';
        }

        collapseAllBtn.addEventListener('click', collapseAll);
        clearAllBtn.addEventListener('click', clearAll);

        function addLogLine(rawData) {
            let lineData = safeParse(rawData);
            if (!lineData) return;
            const logLine = renderCompact(lineData);
            logDiv.appendChild(logLine);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        socket.on('connect', () => console.log('Connected'));
        socket.on('disconnect', () => console.log('Disconnected'));
        socket.on('rawlog', data => addLogLine(data));
    </script>
</body>
</html>
