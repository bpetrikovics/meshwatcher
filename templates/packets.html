<!DOCTYPE html>
<html>
<head>
    <title>Mesh Packet Log | Hungary</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/static/favicon.ico">
    <script src="//cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.min.js"></script>
    <link rel="stylesheet" href="/static/css/packets.css">
</head>
<body>
    <div id="header">
        <div class="header-left">
            <span id="commit-sha" class="commit-sha"></span>
            <div class="header-title">Real-time mesh packet log via {{ settings.mqtt_server }} | Raw data without deduplication</div>
        </div>
        <div class="header-buttons">
            <label class="header-btn" style="display: flex; align-items: center; gap: 4px; cursor: pointer;">
                <input type="checkbox" id="show-duplicates" checked>
                <span>Show duplicates</span>
            </label>
            <button class="header-btn" id="collapse-all">Collapse All</button>
            <button class="header-btn" id="clear-all">Clear</button>
        </div>
    </div>
    <div id="log"></div>

    <script>
        // Configuration passed from Flask template
        window.APP_CONFIG = {
            SOCKET_NAMESPACE: '{{ settings.namespace_packets }}',
            GIT_COMMIT: '{{ settings.git_commit | e }}'
        };
    </script>
    <script src="/static/js/packets.js"></script>
</body>
</html>
